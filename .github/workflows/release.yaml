name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and check source tarball
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Build source tarball
        run: R CMD build .

      - name: Check tarball (--as-cran)
        run: |
          PKG_FILE=$(ls *.tar.gz)
          R CMD check "$PKG_FILE" --as-cran --no-manual

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: "*.tar.gz"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Extract version from DESCRIPTION
        id: version
        run: |
          VERSION=$(grep '^Version:' DESCRIPTION | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from NEWS.md
        id: news
        run: |
          # Extract the body of the first top-level section in NEWS.md
          awk 'NR==1{next} /^# /{exit} {print}' NEWS.md | sed '/^[[:space:]]*$/d' > release_notes.md
          {
            echo "notes<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RAiddin v${{ steps.version.outputs.version }}"
          body: ${{ steps.news.outputs.notes }}
          files: "*.tar.gz"
          prerelease: false
